name = "Dim8"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Dim8", "PaperDefinitions", "PaperTheorems"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "Dim8"

[[lean_lib]]
name = "PaperDefinitions"

[[lean_lib]]
name = "PaperTheorems"
